name: Repository Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  repository-check:
    name: Check required coursework files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required documentation files
        run: |
          test -f README.md
          test -f docs/Game_Concept.md
          test -f docs/Development_Workflow.md
          test -f docs/Asset_Credits.md
          test -f docs/Testing_Log.md
          test -f docs/Daily_Scrum.md

      - name: Check Unity project folder placeholder or project
        run: |
          if [ -d "ShadowPath" ]; then
            echo "ShadowPath folder exists."
          else
            echo "ShadowPath folder has not been added yet. This is expected before Unity project integration."
          fi